<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit API Key</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:600px;
    padding:28px;
}

.card{
    background:#15151f;
    border-radius:24px;
    padding:28px 32px;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 16px 40px rgba(0,0,0,.42);
}

.title{
    text-align:center;
    font-size:1.75rem;
    font-weight:700;
    margin-bottom:28px;
}

.label{
    color:#777790;
    font-size:.8rem;
    font-weight:600;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:8px;
}

.provider{
    width:100%;
    height:60px;

    display:flex;
    align-items:center;

    padding:0 18px;

    background:#1d1d2b;

    border-radius:16px;

    margin-bottom:24px;

    font-size:1.05rem;
    font-weight:600;
}

input{
    width:100%;
    height:60px;

    padding:0 18px;

    background:#1d1d2b;

    color:#fff;

    border:none;

    border-radius:16px;

    font-size:1rem;

    outline:none;

    margin-bottom:24px;
}

input::placeholder{
    color:#8d8da8;
}

button{

    width:100%;
    height:70px;

    border:none;

    border-radius:24px;

    background:#1d1d2b;

    color:#fff;

    font-size:1.25rem;
    font-weight:700;

    cursor:pointer;

    transition:.18s ease;
}

button:hover{

    background:#1b1b28;

}

.status{

    text-align:center;

    margin-top:18px;

    font-size:.95rem;

    color:#25D366;

    min-height:20px;

}
</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
API Key
</div>

<div class="label">
Provider
</div>

<div class="provider" id="provider">
TorBox
</div>

<div class="label">
API Key
</div>

<input
id="apiKey"
type="text"
placeholder="Enter your API Key"
autocomplete="off"
autocorrect="off"
autocapitalize="off"
spellcheck="false">

<button id="saveButton">

Save

</button>

<div class="status" id="status"></div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const deviceId = params.get("id");

const apiKeyInput = document.getElementById("apiKey");
const providerDiv = document.getElementById("provider");
const saveButton = document.getElementById("saveButton");
const statusDiv = document.getElementById("status");

if (!deviceId) {
    statusDiv.style.color = "#ff5c5c";
    statusDiv.textContent = "Missing Device ID";
} else {

    const databaseUrl =
        "https://mx-app-d2d10-default-rtdb.europe-west1.firebasedatabase.app/devices/" +
        deviceId +
        ".json";

    async function loadDevice() {

        try {

            const response = await fetch(databaseUrl);
            const data = await response.json();

            if (data) {

                providerDiv.textContent = data.provider || "TorBox";
                apiKeyInput.value = data.apiKey || "";

            }

        } catch (e) {

            statusDiv.style.color = "#ff5c5c";
            statusDiv.textContent = "Failed to load";

        }

    }

    saveButton.addEventListener("click", async () => {

        statusDiv.textContent = "";

        try {

            const response = await fetch(databaseUrl, {

                method: "PATCH",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    provider: providerDiv.textContent,
                    apiKey: apiKeyInput.value.trim()

                })

            });

            if (!response.ok)
                throw new Error();

            statusDiv.style.color = "#25D366";
            statusDiv.textContent = "Saved successfully";

        } catch (e) {

            statusDiv.style.color = "#ff5c5c";
            statusDiv.textContent = "Failed to save";

        }

    });

    loadDevice();

}
</script>

</body>
</html>
