<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Key</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:600px;
    padding:28px;
    text-align:center;
}

.card{
    background:#15151f;
    border-radius:24px;
    padding:28px 32px;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 16px 40px rgba(0,0,0,.42);
}

.title{
    font-size:1.75rem;
    font-weight:700;
    margin-bottom:22px;
}

.qr{
    display:inline-block;
    width:260px;
    height:260px;
    background:#ffffff;
    border-radius:18px;
    padding:16px;
}

.qr img{
    width:100%;
    height:100%;
    display:block;
    border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
API Key
</div>

<div class="qr">

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=https://example.com"
alt="API Key QR Code">

</div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const deviceId = params.get("id");

console.log("Device ID:", deviceId);
</script>

</body>
</html>
