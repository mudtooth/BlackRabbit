<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Subscription</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0f;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:760px;
    padding:40px;
    text-align:center;
}

.status-card{

    background:#15151f;

    border-radius:28px;

    padding:50px 40px;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:0 20px 50px rgba(0,0,0,.45);

    margin-bottom:28px;

}

.status{

    position:relative;

    display:inline-block;

    font-size:2.8rem;

    font-weight:700;

    margin-bottom:35px;

}

.status-dot{

    position:absolute;

    left:-28px;

    top:50%;

    transform:translateY(-50%);

    width:16px;

    height:16px;

    background:#25D366;

    border-radius:50%;

}

.label{

    color:#777790;

    font-size:.95rem;

    letter-spacing:.18em;

    text-transform:uppercase;

    margin-bottom:10px;

}

.value{

    font-size:2rem;

    font-weight:700;

    margin-bottom:28px;

}

.button{

    display:flex;

    justify-content:center;

    align-items:center;

    width:100%;

    height:95px;

    border-radius:28px;

    background:#15151f;

    color:#fff;

    text-decoration:none;

    font-size:1.55rem;

    font-weight:700;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:0 20px 50px rgba(0,0,0,.45);

    transition:.18s ease;

}

.button:hover,
.button:focus{

    transform:scale(1.03);

    background:#1b1b28;

    border-color:rgba(255,255,255,.08);

    outline:none;

}

.button:active{

    transform:scale(.985);

}

.api{

    display:inline-block;

    margin-top:26px;

    color:#777790;

    font-size:.95rem;

    text-decoration:none;

    transition:.18s;

}

.api:hover{

    color:#fff;

}

</style>

</head>

<body>

<div class="container">

<div class="status-card">

<div class="status">

<div class="status-dot"></div>

Active

</div>

<div class="label">
Expires
</div>

<div class="value">
15 August 2026
</div>

<div class="label">
Remaining
</div>

<div class="value" style="margin-bottom:0;">
23 Days
</div>

</div>

<a class="button" href="#">
Renew Subscription
</a>

<a class="api" href="#">
API Key
</a>

</div>

</body>
</html>
