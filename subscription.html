<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Subscription</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0f;
color:#fff;
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:760px;
padding:40px;
text-align:center;
}

.status{

font-size:2rem;
font-weight:700;
margin-bottom:50px;

}

.active{

color:#25D366;

}

.info{

margin-bottom:35px;

}

.label{

color:#777790;

font-size:1rem;

letter-spacing:.15em;

text-transform:uppercase;

margin-bottom:10px;

}

.value{

font-size:2rem;

font-weight:700;

}

.button{

display:flex;

justify-content:center;

align-items:center;

height:90px;

margin-top:60px;

border-radius:24px;

background:#15151f;

text-decoration:none;

color:white;

font-size:1.5rem;

font-weight:700;

border:1px solid rgba(255,255,255,.05);

transition:.18s;

box-shadow:0 20px 50px rgba(0,0,0,.45);

}

.button:hover{

transform:scale(1.03);

background:#1b1b28;

}

.api{

margin-top:35px;

display:inline-block;

font-size:.95rem;

color:#777790;

text-decoration:none;

}

.back{

position:absolute;

left:40px;

top:30px;

font-size:1rem;

color:#777790;

text-decoration:none;

}
</style>

</head>

<body>

<a class="back" href="index.html">
← Back
</a>

<div class="container">

<div class="status">
<span class="active">●</span> Active
</div>

<div class="info">
<div class="label">
Expires
</div>

<div class="value">
15 August 2026
</div>
</div>

<div class="info">

<div class="label">
Remaining
</div>

<div class="value">
23 Days
</div>

</div>

<a class="button" href="#">
Renew Subscription
</a>

<a class="api" href="#">
API Key
</a>

</div>

</body>
</html>
